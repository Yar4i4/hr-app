<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список сотрудников</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Список сотрудников</h1>
    <button id="addEmployeeBtn">Добавить сотрудника</button>

    <!-- Форма для добавления сотрудника (скрыта по умолчанию) -->
    <div id="addEmployeeForm" style="display: none;">
        <h2>Добавить сотрудника</h2>
        <label for="fullName">ФИО:</label><br>
        <input type="text" id="fullName" name="fullName"><br><br>
        <label for="position">Должность:</label><br>
        <input type="text" id="position" name="position"><br><br>
        <label for="department">Подразделение:</label><br>
        <input type="text" id="department" name="department"><br><br>
        <label for="contacts">Контакты:</label><br>
        <input type="text" id="contacts" name="contacts"><br><br>
        <button id="saveEmployeeBtn">Сохранить</button>
        <button id="cancelAddBtn">Отмена</button>
    </div>

    <input type="text" id="searchInput" placeholder="Поиск по ФИО">
    <ul id="employeeList"></ul>

    <script src="script.js"></script>
</body>

</html>
