<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR System - Управление сотрудниками</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Список сотрудников</h1>
        <div class="controls">
            <button id="addEmployeeBtn">Добавить сотрудника</button>
            <input type="text" id="searchInput" placeholder="Поиск по ФИО">
        </div>
    </header>

    <!-- Форма для добавления сотрудника -->
    <form id="addEmployeeForm" style="display: none;">
        <h2>Добавить нового сотрудника</h2>
        <div class="form-group">
            <label for="fullName">ФИО:</label>
            <input type="text" id="fullName" required>
        </div>
        <div class="form-group">
            <label for="position">Должность:</label>
            <input type="text" id="position">
        </div>
        <div class="form-group">
            <label for="department">Подразделение:</label>
            <input type="text" id="department">
        </div>
        <div class="form-group">
            <label for="contacts">Контакты:</label>
            <input type="text" id="contacts">
        </div>
        <div class="form-actions">
            <button type="submit" id="saveEmployeeBtn">Сохранить</button>
            <button type="button" id="cancelAddBtn">Отмена</button>
        </div>
    </form>

    <!-- Список сотрудников -->
    <ul id="employeeList" class="employee-list"></ul>

    <script src="script.js"></script>
</body>
</html>
